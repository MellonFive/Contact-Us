<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact form</title>
  </head>
  <body>
    <main class="container">
      <h1>Contact Us</h1>

      <form>
        <div class="field-row">
          <label class="field">
            <span>First Name <span class="required">*</span></span>
            <input type="text" name="first-name" placeholder="Enter your first name" required />
          </label>

          <label class="field">
            <span>Last Name <span class="required">*</span></span>
            <input type="text" name="last-name" placeholder="Enter your last name" required />
          </label>
        </div>

        <label class="field">
          <span>Email Address <span class="required">*</span></span>
          <input type="email" name="email" placeholder="Enter your email address" required />
        </label>

        <div class="field">
          <span>Query Type <span class="required">*</span></span>
          <div class="radio-grid">
            <label class="radio-button">
              <input type="radio" name="query-type" value="general" required />
              <span>General Enquiry</span>
            </label>
            <label class="radio-button">
              <input type="radio" name="query-type" value="support" />
              <span>Support Request</span>
            </label>
          </div>
        </div>

        <label class="field">
          <span>Message <span class="required">*</span></span>
          <textarea name="message" placeholder="Enter your message" required
          ></textarea>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" name="consent" required />
          <span>I consent to being contacted by the team <span class="required">*</span></span>
        </label>

        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
